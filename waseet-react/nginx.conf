# Serves the SPA and reverse-proxies the API to the backend container.

# Social/no-JS crawlers get a server-rendered, SEO-complete homepage (link previews,
# OG/Twitter cards) instead of the empty SPA shell. Everyone else gets the SPA.
map $http_user_agent $wa_is_bot {
    default 0;
    "~*(facebookexternalhit|facebot|Twitterbot|WhatsApp|LinkedInBot|Slackbot|Slack-ImgProxy|TelegramBot|Discordbot|Googlebot|bingbot|Applebot|DuckDuckBot|Pinterest|redditbot|Embedly|SkypeUriPreview|vkShare|W3C_Validator|Google-InspectionTool|yandex)" 1;
}

# Prefer the client's original scheme (Cloudflare forwards it) so OG/canonical URLs are https.
map $http_x_forwarded_proto $wa_proto {
    default  $scheme;
    "~.+"    $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # allow document/image uploads through the proxy
    client_max_body_size 20m;

    # API → backend service (internal docker network)
    location /api/ {
        proxy_pass http://backend:19000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # health passthrough (optional)
    location = /health {
        proxy_pass http://backend:19000/health;
    }

    # public object storage (project images, logos, brochures, floor plans…)
    # the public bucket is anonymous-read, so these load without a signature.
    location /storage/ {
        proxy_pass http://rustfs:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # cache built assets aggressively (they are content-hashed)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Homepage: crawlers get the backend prerender (full SEO meta); humans get the SPA.
    location = / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $wa_proto;
        proxy_set_header X-Forwarded-Host $host;
        # nginx forbids a URI part on proxy_pass inside `if`; rewrite the path first,
        # then proxy URI-less so bots actually reach the prerender endpoint.
        if ($wa_is_bot) {
            rewrite ^ /api/v1/landing/prerender break;
            proxy_pass http://backend:19000;
        }
        try_files /index.html =404;
    }

    # SPA fallback — every other route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
