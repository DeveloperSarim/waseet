# Serves the SPA and reverse-proxies the API to the backend container.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # allow document/image uploads through the proxy
    client_max_body_size 20m;

    # API → backend service (internal docker network)
    location /api/ {
        proxy_pass http://backend:19000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # health passthrough (optional)
    location = /health {
        proxy_pass http://backend:19000/health;
    }

    # cache built assets aggressively (they are content-hashed)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
